<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churned accounts — Maine 2024</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #f5f2ec;
    color: #2c2c2a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 1.25rem 1.5rem 1rem;
    border-bottom: 1px solid #ddd8ce;
    background: #fff;
  }

  header h1 {
    font-size: 18px;
    font-weight: normal;
    letter-spacing: 0.01em;
    color: #2c2c2a;
  }

  header p {
    font-size: 13px;
    color: #888780;
    margin-top: 3px;
    font-family: 'Helvetica Neue', sans-serif;
  }

  .metrics {
    display: flex;
    gap: 0;
    background: #fff;
    border-bottom: 1px solid #ddd8ce;
  }

  .metric {
    flex: 1;
    padding: 0.75rem 1.25rem;
    border-right: 1px solid #ddd8ce;
  }

  .metric:last-child { border-right: none; }

  .metric-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888780;
    font-family: 'Helvetica Neue', sans-serif;
    margin-bottom: 3px;
  }

  .metric-value {
    font-size: 20px;
    color: #2c2c2a;
  }

  #map {
    flex: 1;
    min-height: 560px;
  }

  .legend {
    display: flex;
    gap: 20px;
    padding: 0.75rem 1.5rem;
    background: #fff;
    border-top: 1px solid #ddd8ce;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    color: #5F5E5A;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.15);
    flex-shrink: 0;
  }

  .map-legend {
    background: #fff;
    border: 1px solid #ddd8ce;
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    color: #2c2c2a;
    line-height: 1.5;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }

  .map-legend-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #888780;
    margin-bottom: 7px;
  }

  .map-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .map-legend-item:last-child { margin-bottom: 0; }

  .map-legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.15);
    flex-shrink: 0;
    display: inline-block;
  }

  .leaflet-popup-content-wrapper {
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    border: 0.5px solid #ddd8ce;
  }

  .leaflet-popup-tip { background: #fff; }
</style>
</head>
<body>

<header>
  <h1>Churned accounts — Maine, 2024</h1>
  <p>Accounts with purchases in 2024 and no purchases in 2025 &middot; dot size reflects 2024 revenue</p>
</header>

<div class="metrics">
  <div class="metric">
    <div class="metric-label">2024 revenue at risk</div>
    <div class="metric-value">$8,487</div>
  </div>
  <div class="metric">
    <div class="metric-label">Accounts open</div>
    <div class="metric-value">21</div>
  </div>
  <div class="metric">
    <div class="metric-label">Accounts closed</div>
    <div class="metric-value">3</div>
  </div>
  <div class="metric">
    <div class="metric-label">Seasonal accounts</div>
    <div class="metric-value">6</div>
  </div>
</div>

<div id="map"></div>



<script>
const accounts = [
  {name:'Rosemont Munjoy Hill',      address:'88 Congress St, Portland, ME',          lat:43.6608, lng:-70.2467, rev:1447.60, open:0, seasonal:0},
  {name:'Portland Sea Dogs',         address:'271 Park Ave, Portland, ME',             lat:43.6613, lng:-70.2791, rev:809.25,  open:1, seasonal:1},
  {name:'Taj Indian Cuisine',        address:'333 Clarks Pond Pkwy, South Portland',   lat:43.6384, lng:-70.3173, rev:764.00,  open:1, seasonal:0},
  {name:"Henry's Public House",      address:'375 Fore St, Portland, ME',              lat:43.6580, lng:-70.2491, rev:611.20,  open:1, seasonal:0},
  {name:'Island Spirits',            address:'32 E Main St, Vinalhaven, ME',           lat:44.0337, lng:-68.8458, rev:552.90,  open:1, seasonal:0},
  {name:'Scales',                    address:'68 Commercial St, Portland, ME',         lat:43.6567, lng:-70.2539, rev:534.80,  open:1, seasonal:0},
  {name:'Maine Lakeside Cabins',     address:'1008 US-201, Caratunk, ME',              lat:45.0760, lng:-69.9810, rev:476.50,  open:1, seasonal:0},
  {name:'The Good Table',            address:'527 Ocean House Rd, Cape Elizabeth',     lat:43.5912, lng:-70.2452, rev:458.40,  open:1, seasonal:1},
  {name:'Babas',                     address:'79 Island Ave, Portland, ME',            lat:43.6574, lng:-70.1938, rev:382.00,  open:1, seasonal:1},
  {name:'Maine Tasting Center',      address:'506 Old Bath Rd, Wiscasset, ME',         lat:44.0032, lng:-69.6645, rev:341.80,  open:1, seasonal:1},
  {name:'Salt Water Grille',         address:'231 Front St, South Portland, ME',       lat:43.6418, lng:-70.2698, rev:305.60,  open:1, seasonal:0},
  {name:'Smalls',                    address:'28 Brackett St, Portland, ME',           lat:43.6549, lng:-70.2627, rev:305.60,  open:1, seasonal:0},
  {name:'Cape Elizabeth Land Trust', address:'330 Ocean House Rd, Cape Elizabeth',     lat:43.5782, lng:-70.2307, rev:240.00,  open:1, seasonal:0},
  {name:"Diamond's Edge",            address:'279 Diamond Ave, Portland, ME',          lat:43.6623, lng:-70.1853, rev:170.90,  open:1, seasonal:1},
  {name:'Bayside Bowl',              address:'58 Alder St, Portland, ME',              lat:43.6641, lng:-70.2654, rev:161.85,  open:1, seasonal:0},
  {name:'Bier Cellar - Gorham',      address:'593 Main St, Gorham, ME',                lat:43.6800, lng:-70.4436, rev:152.80,  open:0, seasonal:0},
  {name:"Trudy Bird's Olbar",        address:'424 Walnut Hill Rd, North Yarmouth',     lat:43.8218, lng:-70.1872, rev:152.80,  open:1, seasonal:0},
  {name:'Taco Trio LLC',             address:'119 Ocean St, South Portland, ME',       lat:43.6327, lng:-70.2892, rev:152.80,  open:1, seasonal:0},
  {name:'Pirates Cove (Old Orchard Beach)', address:'70 1st St, Old Orchard Beach, ME', lat:43.5160, lng:-70.3756, rev:120.00,  open:1, seasonal:1},
  {name:'Pirates Cove (Bar Harbor)',        address:'368 ME-3, Bar Harbor, ME',         lat:44.3876, lng:-68.2039, rev:120.00,  open:1, seasonal:1},
  {name:"DiMillo's",                 address:'25 Long Wharf, Portland, ME',            lat:43.6572, lng:-70.2554, rev:86.40,   open:1, seasonal:0},
  {name:'Black Tie Catering',        address:'275 Main St, Yarmouth, ME',              lat:43.8038, lng:-70.1928, rev:85.45,   open:1, seasonal:0},
  {name:'Rattle Shake Grill',        address:'501 Cottage Rd, South Portland, ME',     lat:43.6276, lng:-70.2949, rev:76.40,   open:1, seasonal:0},
  {name:'Local 188',                 address:'685 Congress St, Portland, ME',          lat:43.6604, lng:-70.2580, rev:76.40,   open:0, seasonal:0},
  {name:'North 43 Bistro',           address:'1 Spring Point Dr, South Portland',      lat:43.6336, lng:-70.2967, rev:22.00,   open:1, seasonal:0},
];

function dotColor(a) {
  if (a.open === 0) return '#888780';
  if (a.seasonal === 1) return '#EF9F27';
  return '#D85A30';
}

function dotRadius(rev) {
  return 8;
}

const map = L.map('map').setView([44.1, -69.5], 8);

const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'map-legend');
  div.innerHTML = `
    <div class="map-legend-title">Account status</div>
    <div class="map-legend-item"><span class="map-legend-dot" style="background:#D85A30"></span>Open, not seasonal</div>
    <div class="map-legend-item"><span class="map-legend-dot" style="background:#EF9F27"></span>Open, seasonal</div>
    <div class="map-legend-item"><span class="map-legend-dot" style="background:#888780"></span>Closed</div>
  `;
  return div;
};
legend.addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

accounts.forEach(a => {
  const marker = L.circleMarker([a.lat, a.lng], {
    radius: dotRadius(a.rev),
    fillColor: dotColor(a),
    color: '#fff',
    weight: 1.5,
    fillOpacity: 0.9
  }).addTo(map);

  const statusLabel = a.open === 0 ? 'Closed' : (a.seasonal ? 'Open &middot; seasonal' : 'Open &middot; not seasonal');
  const statusColor = a.open === 0 ? '#888780' : (a.seasonal ? '#854F0B' : '#993C1D');

  marker.bindPopup(`
    <div style="font-family:'Helvetica Neue',sans-serif;min-width:170px;padding:2px 0">
      <div style="font-size:13px;font-weight:600;color:#2c2c2a;margin-bottom:2px">${a.name}</div>
      <div style="font-size:11px;color:${statusColor};margin-bottom:6px">${statusLabel}</div>
      <div style="font-size:11px;color:#888780;margin-bottom:6px">${a.address}</div>
      <div style="font-size:12px;color:#2c2c2a">2024 revenue: <strong>$${a.rev.toLocaleString('en-US',{minimumFractionDigits:2})}</strong></div>
    </div>
  `);
});
</script>
</body>
</html>
